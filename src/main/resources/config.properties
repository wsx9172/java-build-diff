# ============================================
# Class Comparator 配置文件 (内置模板)
# 所有配置均有代码默认值，仅 AI API Key 必须外部配置
# 外部覆盖: 在运行目录放置 config.properties 可覆盖此模板
# ============================================

# --- 目录 ---
#old.dir=project/old
#new.dir=project/new
#report.dir=report

# --- 线程 (0=自动检测) ---
#threads=0

# --- 反编译引擎 (cfr / procyon) ---
#decompiler=cfr

# --- AI 审查 ---
ai.enabled=false
# 抽检比例
ai.sample.rate=100%
ai.base.url=https://api.deepseek.com/v1
ai.model=deepseek-v4-flash
ai.concurrency=32
ai.api.key=sk-***